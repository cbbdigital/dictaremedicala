<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dictare Medicală</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f5f1;
    --card: #ffffff;
    --card-border: #e9e2da;
    --text: #3d342c;
    --text-dim: #b0a69b;
    --text-mid: #7d7168;
    --accent: #c0392b;
    --accent-soft: #d4655b;
    --accent-glow: rgba(192, 57, 43, 0.22);
    --accent-bg: rgba(192, 57, 43, 0.06);
    --green: #6a9e7e;
    --warm-shadow: rgba(100, 80, 60, 0.07);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 40px;
    padding-bottom: 40px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 30%, rgba(210,180,140,0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(192,57,43,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 820px;
    padding: 24px;
  }

  .user-bar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
    margin-bottom: 12px;
    padding: 0 4px;
  }

  .user-name {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 400;
  }

  .logout-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--card-border);
    padding: 5px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .logout-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .header h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-mid);
    font-weight: 600;
  }

  .header h1 span {
    color: var(--accent);
    font-weight: 700;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 4px 30px var(--warm-shadow), 0 1px 3px var(--warm-shadow);
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 28px 36px;
    border-bottom: 1px solid var(--card-border);
    background: linear-gradient(180deg, rgba(246,242,237,0.4), transparent);
  }

  .rec-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    position: relative;
    background: linear-gradient(145deg, var(--accent), var(--accent-soft));
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s;
    outline: none;
    box-shadow: 0 3px 12px rgba(192,57,43,0.25);
  }

  .rec-btn:hover { transform: scale(1.06); }

  .rec-btn .icon {
    width: 18px;
    height: 18px;
    background: white;
    border-radius: 50%;
    transition: all 0.3s;
  }

  .rec-btn.recording .icon {
    border-radius: 4px;
    width: 16px;
    height: 16px;
  }

  .rec-btn.recording {
    animation: heartbeat 1s ease-in-out infinite;
  }

  .rec-btn::after {
    content: '';
    position: absolute;
    inset: -7px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: border-color 0.3s;
  }

  .rec-btn.recording::after {
    border-color: var(--accent-glow);
    animation: pulse-ring 1.5s ease-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); box-shadow: 0 3px 12px rgba(192,57,43,0.25); }
    15% { transform: scale(1.12); box-shadow: 0 4px 24px rgba(192,57,43,0.35); }
    30% { transform: scale(1.0); box-shadow: 0 3px 16px rgba(192,57,43,0.28); }
    45% { transform: scale(1.08); box-shadow: 0 4px 20px rgba(192,57,43,0.32); }
  }

  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.45); opacity: 0; }
  }

  .btn-group {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .rec-btn-group {
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .ctrl-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    outline: none;
  }

  .ctrl-pause {
    background: var(--card);
    border: 2px solid var(--card-border);
    color: var(--text);
    box-shadow: 0 2px 8px var(--warm-shadow);
  }

  .ctrl-pause:hover {
    border-color: var(--text-dim);
    transform: scale(1.06);
  }

  .ctrl-pause.paused {
    border-color: var(--green);
    color: var(--green);
  }

  .ctrl-stop {
    background: linear-gradient(145deg, var(--accent), var(--accent-soft));
    color: #fff;
    box-shadow: 0 3px 12px rgba(192,57,43,0.25);
    animation: heartbeat 1s ease-in-out infinite;
  }

  .ctrl-stop:hover {
    transform: scale(1.06);
  }

  .status {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .status-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .status-sub {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  .timer {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    color: var(--text-dim);
    letter-spacing: 1px;
    min-width: 80px;
    text-align: right;
  }

  .timer.active { color: var(--accent); }

  /* Waveform */
  .wave-container {
    height: 72px;
    padding: 0 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    border-bottom: 1px solid var(--card-border);
    background: var(--accent-bg);
  }

  .wave-bar {
    width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    border-radius: 3px;
    height: 4px;
    transition: height 0.08s ease;
    opacity: 0.18;
  }

  .wave-bar.active {
    opacity: 0.7;
  }

  /* Transcript area */
  .transcript-area {
    min-height: 260px;
    max-height: 400px;
    overflow-y: auto;
    padding: 32px 36px;
    position: relative;
  }

  .transcript-area::-webkit-scrollbar { width: 4px; }
  .transcript-area::-webkit-scrollbar-track { background: transparent; }
  .transcript-area::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 4px; }

  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--text-dim);
  }

  .placeholder svg {
    opacity: 0.18;
    color: var(--text-mid);
  }

  .placeholder p {
    font-size: 14px;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  .transcript-text {
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    line-height: 1.9;
    font-weight: 400;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .transcript-text .interim {
    color: var(--text-dim);
    font-style: italic;
  }

  .card-footer {
    padding: 16px 36px;
    border-top: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(0deg, rgba(246,242,237,0.3), transparent);
  }

  .actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .rec-actions {
    gap: 10px;
  }

  .btn-sm {
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 10px;
    border: 1px solid var(--card-border);
    background: transparent;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-sm:hover {
    border-color: var(--text-dim);
    color: var(--text);
    background: rgba(168,158,147,0.06);
  }

  .btn-sm.copy-done {
    border-color: var(--green);
    color: var(--green);
  }

  .btn-pause, .btn-stop {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
  }

  .btn-pause {
    border-color: var(--text-dim);
    color: var(--text);
  }

  .btn-pause.paused {
    border-color: var(--green);
    color: var(--green);
  }

  .btn-stop {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .btn-stop:hover {
    background: var(--accent-soft);
    border-color: var(--accent-soft);
    color: #fff;
  }

  .scroll-top {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--card-border);
    box-shadow: 0 3px 16px var(--warm-shadow);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-mid);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 50;
  }

  .scroll-top.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .scroll-top:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 4px 20px rgba(192,57,43,0.12);
  }

  .error-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    border: 1px solid var(--accent-soft);
    padding: 12px 24px;
    border-radius: 14px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    box-shadow: 0 4px 20px var(--warm-shadow);
  }

  .error-toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .btn-save {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-save:hover {
    background: var(--accent-soft);
    border-color: var(--accent-soft);
    color: #fff;
  }
  .btn-save.saved {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }

  /* History */
  .history-section {
    margin-top: 24px;
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding: 0 4px;
  }

  .history-header h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    letter-spacing: 0.5px;
  }

  .history-count {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-right: 4px;
  }

  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 4px; }

  .history-empty {
    text-align: center;
    padding: 32px;
    color: var(--text-dim);
    font-size: 13px;
    font-style: italic;
  }

  .history-item {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 20px 24px;
    transition: all 0.2s;
    position: relative;
    box-shadow: 0 1px 4px var(--warm-shadow);
  }

  .history-item:hover {
    border-color: rgba(168,158,147,0.4);
    box-shadow: 0 2px 16px var(--warm-shadow);
  }

  .history-item-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .history-date {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
  }

  .history-duration {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
  }

  .history-preview {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    transition: all 0.3s;
  }

  .history-item.expanded .history-preview {
    -webkit-line-clamp: unset;
    display: block;
  }

  .history-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--card-border);
  }

  .expand-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0;
    transition: opacity 0.2s;
  }

  .expand-btn:hover { opacity: 0.7; }

  .expand-btn svg {
    transition: transform 0.3s;
  }

  .history-item.expanded .expand-btn svg {
    transform: rotate(180deg);
  }

  .history-actions {
    display: flex;
    gap: 6px;
  }

  .history-actions button {
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--card-border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .history-actions button:hover {
    color: var(--text);
    border-color: var(--text-dim);
  }

  .history-actions button.delete-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
</style>
</head>
<body>

<div class="container">
  <div class="user-bar" id="userBar" style="display:none;">
    <span class="user-name" id="userInfo"></span>
    <button class="logout-btn" onclick="handleLogout()">Deconectare</button>
  </div>
  <div class="header">
    <h1>Dictare <span>●</span> Medicală</h1>
  </div>

  <div class="card">
    <div class="card-top">
      <!-- Idle: single record button -->
      <div class="btn-group" id="idleBtnGroup">
        <button class="rec-btn" id="recBtn" onclick="toggleRecording()">
          <div class="icon"></div>
        </button>
      </div>
      <!-- Recording: pause + stop buttons -->
      <div class="btn-group rec-btn-group" id="recBtnGroup" style="display:none;">
        <button class="ctrl-btn ctrl-pause" id="pauseBtnTop" onclick="pauseRecording()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        </button>
        <button class="ctrl-btn ctrl-stop" onclick="stopRecording()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        </button>
      </div>
      <div class="status">
        <div class="status-label" id="statusLabel">Începe înregistrarea</div>
        <div class="status-sub" id="statusSub">apasă pentru a dicta</div>
      </div>
      <div class="timer" id="timer">00:00</div>
    </div>

    <div class="wave-container" id="waveContainer"></div>

    <div class="transcript-area" id="transcriptArea">
      <div class="placeholder" id="placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <p>textul transcris va apărea aici</p>
      </div>
      <div class="transcript-text" id="transcriptText"></div>
    </div>

    <div class="card-footer">
      <div class="actions" id="idleActions">
        <button class="btn-sm" onclick="clearTranscript()">Șterge</button>
        <button class="btn-sm" id="copyBtn" onclick="copyTranscript()">Copiază</button>
        <button class="btn-sm btn-save" id="saveBtn" onclick="saveRecord()">Salvează</button>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection">
    <div class="history-header">
      <h2>Înregistrări anterioare</h2>
      <span class="history-count" id="historyCount"></span>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty" id="historyEmpty">
        <p>Nicio înregistrare salvată</p>
      </div>
    </div>
  </div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<div class="error-toast" id="errorToast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // ─── Supabase Init (graceful fallback to localStorage if SDK fails) ───
  const SUPABASE_URL = 'https://qyvazbksamffwqfxakoo.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5dmF6YmtzYW1mZndxZnhha29vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODgzNTAsImV4cCI6MjA5MDU2NDM1MH0.vB6dz16AkEXE-Vs6tRKbv0vfL8M7OE0r7QI38KRSKug';
  let sb = null;
  let useSupabase = false;
  try {
    if (window.supabase) {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      useSupabase = true;
    }
  } catch(e) { console.warn('Supabase SDK not available, using localStorage fallback'); }

  // ─── Wave bars setup ───
  const BAR_COUNT = 80;
  const bars = [];
  for (let i = 0; i < BAR_COUNT; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    waveContainer.appendChild(bar);
    bars.push(bar);
  }

  // ─── State ───
  let isRecording = false;
  let recognition = null;
  let finalTranscript = '';
  let timerInterval = null;
  let seconds = 0;
  let audioCtx, analyser, micStream, animFrame;

  // ─── Romanian medical number/unit post-processing ───
  const roNumbers = {
    'zero':0,'unu':1,'una':1,'un':1,'doi':2,'două':2,'trei':3,'patru':4,
    'cinci':5,'șase':6,'sase':6,'șapte':7,'sapte':7,'opt':8,'nouă':9,'noua':9,
    'zece':10,'unsprezece':11,'doisprezece':12,'douăsprezece':12,'treisprezece':13,
    'treisprezece':13,'paisprezece':14,'cincisprezece':15,'șaisprezece':16,
    'saisprezece':16,'șaptesprezece':17,'saptesprezece':17,'optsprezece':18,
    'nouăsprezece':19,'nouasprezece':19,
    'douăzeci':20,'douazeci':20,'treizeci':30,'patruzeci':40,'cincizeci':50,
    'șaizeci':60,'saizeci':60,'șaptezeci':70,'saptezeci':70,'optzeci':80,
    'nouăzeci':90,'nouazeci':90,'o sută':100,'o mie':1000,
  };

  function wordToNum(w) {
    if (!w) return null;
    const low = w.toLowerCase().trim();
    if (roNumbers.hasOwnProperty(low)) return roNumbers[low];
    // compound: "douăzeci și trei" → try
    const m = low.match(/^(.+?)\s+(?:și|si)\s+(.+)$/);
    if (m && roNumbers[m[1]] !== undefined && roNumbers[m[2]] !== undefined) {
      return roNumbers[m[1]] + roNumbers[m[2]];
    }
    return null;
  }

  function postProcess(text) {
    // "X pe Y" → X/Y  (e.g. "șaptesprezece pe doi" → "17/2")
    text = text.replace(
      /(\b(?:(?:douăzeci|douazeci|treizeci|patruzeci|cincizeci|[sș]aizeci|[sș]aptezeci|optzeci|nou[aă]zeci)(?:\s+(?:și|si)\s+(?:unu|una|doi|dou[aă]|trei|patru|cinci|[sș]ase|[sș]apte|opt|nou[aă]))?|zero|unu|una|un|doi|dou[aă]|trei|patru|cinci|[sș]ase|[sș]apte|opt|nou[aă]|zece|unsprezece|doi[sș]prezece|dou[aă]sprezece|treisprezece|paisprezece|cincisprezece|[sș]aisprezece|[sș]aptesprezece|optsprezece|nou[aă]sprezece|douăzeci|douazeci|treizeci|patruzeci|cincizeci|[sș]aizeci|[sș]aptezeci|optzeci|nou[aă]zeci|o sut[aă]|o mie)\b)\s+pe\s+(\b(?:(?:douăzeci|douazeci|treizeci|patruzeci|cincizeci|[sș]aizeci|[sș]aptezeci|optzeci|nou[aă]zeci)(?:\s+(?:și|si)\s+(?:unu|una|doi|dou[aă]|trei|patru|cinci|[sș]ase|[sș]apte|opt|nou[aă]))?|zero|unu|una|un|doi|dou[aă]|trei|patru|cinci|[sș]ase|[sș]apte|opt|nou[aă]|zece|unsprezece|doi[sș]prezece|dou[aă]sprezece|treisprezece|paisprezece|cincisprezece|[sș]aisprezece|[sș]aptesprezece|optsprezece|nou[aă]sprezece|douăzeci|douazeci|treizeci|patruzeci|cincizeci|[sș]aizeci|[sș]aptezeci|optzeci|nou[aă]zeci|o sut[aă]|o mie)\b)/gi,
      (match, p1, p2) => {
        const n1 = wordToNum(p1);
        const n2 = wordToNum(p2);
        if (n1 !== null && n2 !== null) return `${n1}/${n2}`;
        return match;
      }
    );

    // standalone number words → digits (only remaining ones)
    const numPattern = /\b((?:(?:douăzeci|douazeci|treizeci|patruzeci|cincizeci|[sș]aizeci|[sș]aptezeci|optzeci|nou[aă]zeci)\s+(?:și|si)\s+(?:unu|una|doi|dou[aă]|trei|patru|cinci|[sș]ase|[sș]apte|opt|nou[aă]))|(?:zero|unu|una|doi|dou[aă]|trei|patru|cinci|[sș]ase|[sș]apte|opt|nou[aă]|zece|unsprezece|doi[sș]prezece|dou[aă]sprezece|treisprezece|paisprezece|cincisprezece|[sș]aisprezece|[sș]aptesprezece|optsprezece|nou[aă]sprezece|douăzeci|douazeci|treizeci|patruzeci|cincizeci|[sș]aizeci|[sș]aptezeci|optzeci|nou[aă]zeci|o sut[aă]|o mie))\b/gi;
    text = text.replace(numPattern, (m) => {
      const n = wordToNum(m);
      return n !== null ? String(n) : m;
    });

    // "X ori Y" or "X înmulțit cu Y" → X×Y
    text = text.replace(/(\d+)\s*(?:ori|înmulțit cu|inmultit cu)\s*(\d+)/gi, '$1×$2');

    // "milimetri" → mm, "centimetri" → cm
    text = text.replace(/\b(\d+)\s*milimetri\b/gi, '$1 mm');
    text = text.replace(/\b(\d+)\s*centimetri\b/gi, '$1 cm');

    // "virgulă" → comma for decimals: "3 virgulă 5" → "3,5"
    text = text.replace(/(\d+)\s*virgul[aă]\s*(\d+)/gi, '$1,$2');

    return text;
  }

  // ─── Timer ───
  function startTimer() {
    seconds = 0;
    updateTimerDisplay();
    timerInterval = setInterval(() => { seconds++; updateTimerDisplay(); }, 1000);
    document.getElementById('timer').classList.add('active');
  }

  function stopTimer() {
    clearInterval(timerInterval);
    document.getElementById('timer').classList.remove('active');
  }

  function updateTimerDisplay() {
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    document.getElementById('timer').textContent = `${m}:${s}`;
  }

  // ─── Waveform animation ───
  function startWave() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;

    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      micStream = stream;
      const source = audioCtx.createMediaStreamSource(stream);
      source.connect(analyser);
      drawWave();
    });
  }

  function drawWave() {
    const data = new Uint8Array(analyser.frequencyBinCount);
    function loop() {
      analyser.getByteFrequencyData(data);
      const step = Math.floor(data.length / BAR_COUNT);
      for (let i = 0; i < BAR_COUNT; i++) {
        const val = data[i * step] || 0;
        const h = Math.max(4, (val / 255) * 64);
        bars[i].style.height = h + 'px';
        bars[i].classList.toggle('active', val > 20);
      }
      animFrame = requestAnimationFrame(loop);
    }
    loop();
  }

  function stopWave() {
    cancelAnimationFrame(animFrame);
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    if (audioCtx) audioCtx.close();
    bars.forEach(b => { b.style.height = '4px'; b.classList.remove('active'); });
  }

  // ─── Speech Recognition ───
  function initRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      showError('Browserul nu suportă Speech Recognition. Folosește Chrome.');
      return null;
    }
    const r = new SR();
    r.lang = 'ro-RO';
    r.continuous = true;
    r.interimResults = true;
    r.maxAlternatives = 1;

    r.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          finalTranscript += postProcess(t) + ' ';
        } else {
          interim += t;
        }
      }
      render(interim);
    };

    r.onerror = (e) => {
      if (e.error === 'not-allowed') showError('Permite accesul la microfon.');
      else if (e.error !== 'no-speech') showError('Eroare: ' + e.error);
    };

    r.onend = () => {
      if (isRecording) r.start(); // auto-restart
    };

    return r;
  }

  // ─── Smart Punctuation via Supabase Edge Function ───
  let isPunctuating = false;
  const PUNCTUATE_URL = SUPABASE_URL + '/functions/v1/punctuate';

  async function punctuateText(text) {
    if (!text.trim()) return text;
    isPunctuating = true;
    document.getElementById('statusLabel').textContent = 'Se procesează textul...';
    document.getElementById('statusSub').textContent = 'adăugare punctuație și formatare';

    try {
      const response = await fetch(PUNCTUATE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text.trim() })
      });

      const data = await response.json();
      if (data?.text) return data.text;
    } catch (err) {
      console.warn('Punctuation failed:', err);
    } finally {
      isPunctuating = false;
    }
    return text;
  }

  function render(interim) {
    const el = document.getElementById('transcriptText');
    const ph = document.getElementById('placeholder');
    if (finalTranscript || interim) {
      ph.style.display = 'none';
      el.innerHTML = finalTranscript + (interim ? `<span class="interim">${interim}</span>` : '');
      el.parentElement.scrollTop = el.parentElement.scrollHeight;
    }
  }

  // ─── Recording Controls ───
  let isPaused = false;

  function showTopRecBtns() {
    document.getElementById('idleBtnGroup').style.display = 'none';
    document.getElementById('recBtnGroup').style.display = 'flex';
  }

  function showTopIdleBtn() {
    document.getElementById('idleBtnGroup').style.display = 'flex';
    document.getElementById('recBtnGroup').style.display = 'none';
  }

  function showRecActions() {}
  function showIdleActions() {}

  function toggleRecording() {
    if (!isRecording) {
      recognition = initRecognition();
      if (!recognition) return;
      recognition.start();
      startWave();
      startTimer();
      document.getElementById('statusLabel').textContent = 'Se înregistrează...';
      document.getElementById('statusSub').textContent = 'vorbește clar și natural';
      isRecording = true;
      isPaused = false;
      showTopRecBtns();
      showRecActions();
    }
  }

  function pauseRecording() {
    if (!isRecording && !isPaused) return;
    const pauseBtn = document.getElementById('pauseBtnTop');
    if (!isPaused) {
      recognition.stop();
      stopWave();
      clearInterval(timerInterval);
      isPaused = true;
      document.getElementById('statusLabel').textContent = 'Pauză';
      document.getElementById('statusSub').textContent = 'apasă ▶ pentru a continua';
      pauseBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';
      pauseBtn.classList.add('paused');
    } else {
      recognition = initRecognition();
      if (!recognition) return;
      recognition.start();
      startWave();
      timerInterval = setInterval(() => { seconds++; updateTimerDisplay(); }, 1000);
      isPaused = false;
      document.getElementById('statusLabel').textContent = 'Se înregistrează...';
      document.getElementById('statusSub').textContent = 'vorbește clar și natural';
      pauseBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>';
      pauseBtn.classList.remove('paused');
    }
  }

  async function stopRecording() {
    if (!isRecording && !isPaused) return;
    if (recognition) recognition.stop();
    stopWave();
    stopTimer();
    isRecording = false;
    isPaused = false;
    const pauseBtn = document.getElementById('pauseBtnTop');
    pauseBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>';
    pauseBtn.classList.remove('paused');
    showTopIdleBtn();
    showIdleActions();

    // Run smart punctuation
    if (finalTranscript.trim()) {
      const punctuated = await punctuateText(finalTranscript);
      finalTranscript = punctuated + ' ';
      render('');
    }

    document.getElementById('statusLabel').textContent = 'Începe înregistrarea';
    document.getElementById('statusSub').textContent = 'apasă pentru a dicta';
  }

  // ─── Actions ───
  function clearTranscript() {
    finalTranscript = '';
    document.getElementById('transcriptText').innerHTML = '';
    document.getElementById('placeholder').style.display = '';
    seconds = 0;
    updateTimerDisplay();
  }

  function copyTranscript() {
    if (!finalTranscript.trim()) return;
    navigator.clipboard.writeText(finalTranscript.trim()).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copiat ✓';
      btn.classList.add('copy-done');
      setTimeout(() => { btn.textContent = 'Copiază'; btn.classList.remove('copy-done'); }, 2000);
    });
  }

  function showError(msg) {
    const toast = document.getElementById('errorToast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4000);
  }

  // ─── History (Supabase + localStorage fallback) ───
  const LS_KEY = 'dictare_history';
  let currentUser = null;

  async function initAuth() {
    if (!useSupabase) { renderHistory(getLocalHistory()); return; }
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        currentUser = session.user;
        // Show user info in header
        const name = session.user.user_metadata?.full_name || session.user.email;
        document.getElementById('userInfo').textContent = name;
        document.getElementById('userBar').style.display = 'flex';
        await loadHistory();
      } else {
        // No session — redirect to login
        window.location.href = '/';
      }
    } catch(e) {
      console.warn('Supabase auth failed, using localStorage', e);
      useSupabase = false;
      renderHistory(getLocalHistory());
    }
  }

  async function handleLogout() {
    if (useSupabase) await sb.auth.signOut();
    window.location.href = '/';
  }

  // ─── localStorage helpers ───
  function getLocalHistory() {
    try {
      const data = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
      const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
      return data.filter(r => new Date(r.created_at).getTime() > cutoff);
    } catch { return []; }
  }

  function saveLocalHistory(records) {
    localStorage.setItem(LS_KEY, JSON.stringify(records));
  }

  // ─── Unified functions ───
  async function loadHistory() {
    if (!useSupabase) { renderHistory(getLocalHistory()); return; }
    try {
      const thirtyDaysAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
      const { data, error } = await sb
        .from('recordings')
        .select('*')
        .gte('created_at', thirtyDaysAgo)
        .order('created_at', { ascending: false });
      if (!error && data) renderHistory(data);
    } catch { renderHistory(getLocalHistory()); }
  }

  async function saveRecord() {
    const text = finalTranscript.trim();
    if (!text) return;

    if (useSupabase && currentUser) {
      const { error } = await sb.from('recordings').insert({
        user_id: currentUser.id,
        text: text,
        duration: seconds
      });
      if (error) { showError('Eroare la salvare: ' + error.message); return; }
      await loadHistory();
    } else {
      const records = getLocalHistory();
      records.unshift({
        id: crypto.randomUUID(),
        created_at: new Date().toISOString(),
        duration: seconds,
        text: text
      });
      saveLocalHistory(records);
      renderHistory(records);
    }

    const btn = document.getElementById('saveBtn');
    btn.textContent = 'Salvat ✓';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'Salvează'; btn.classList.remove('saved'); }, 2000);
    clearTranscript();
  }

  async function deleteRecord(id) {
    if (useSupabase && currentUser) {
      const { error } = await sb.from('recordings').delete().eq('id', id);
      if (!error) await loadHistory();
    } else {
      const records = getLocalHistory().filter(r => r.id !== id);
      saveLocalHistory(records);
      renderHistory(records);
    }
  }

  function copyRecord(text, btnEl) {
    navigator.clipboard.writeText(text).then(() => {
      btnEl.textContent = 'Copiat ✓';
      setTimeout(() => { btnEl.textContent = 'Copiază'; }, 1500);
    });
  }

  function toggleExpand(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (!el) return;
    el.classList.toggle('expanded');
    const span = el.querySelector('.expand-btn span');
    span.textContent = el.classList.contains('expanded') ? 'Restrânge' : 'Extinde';
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const day = String(d.getDate()).padStart(2,'0');
    const month = String(d.getMonth()+1).padStart(2,'0');
    const year = d.getFullYear();
    const h = String(d.getHours()).padStart(2,'0');
    const m = String(d.getMinutes()).padStart(2,'0');
    return `${day}.${month}.${year} · ${h}:${m}`;
  }

  function formatDuration(s) {
    if (!s) return '';
    const m = Math.floor(s/60);
    const sec = s % 60;
    return `${m}m ${sec}s`;
  }

  function renderHistory(records) {
    const list = document.getElementById('historyList');
    const empty = document.getElementById('historyEmpty');
    const count = document.getElementById('historyCount');

    count.textContent = records.length ? `${records.length} înregistr${records.length === 1 ? 'are' : 'ări'}` : '';

    if (!records.length) {
      list.innerHTML = '';
      list.appendChild(empty);
      empty.style.display = '';
      return;
    }

    empty.style.display = 'none';
    list.innerHTML = records.map(r => `
      <div class="history-item" data-id="${r.id}">
        <div class="history-item-top">
          <span class="history-date">${formatDate(r.created_at)}</span>
          <span class="history-duration">${formatDuration(r.duration)}</span>
        </div>
        <div class="history-preview">${escapeHtml(r.text)}</div>
        <div class="history-bottom">
          <button class="expand-btn" onclick="toggleExpand('${r.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            <span>Extinde</span>
          </button>
          <div class="history-actions">
            <button onclick="copyRecord('${escapeForAttr(r.text)}', this)">Copiază</button>
            <button class="delete-btn" onclick="deleteRecord('${r.id}')">Șterge</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
  }

  function escapeForAttr(t) {
    return t.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');
  }

  // Init
  initAuth();

  // Scroll-to-top visibility
  const scrollBtn = document.getElementById('scrollTop');
  window.addEventListener('scroll', () => {
    scrollBtn.classList.toggle('visible', window.scrollY > 300);
  });
</script>
