<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dictare Medicală — Autentificare</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f5f1;
    --card: #ffffff;
    --card-border: #e9e2da;
    --text: #3d342c;
    --text-dim: #b0a69b;
    --text-mid: #7d7168;
    --accent: #c0392b;
    --accent-soft: #d4655b;
    --green: #6a9e7e;
    --warm-shadow: rgba(100, 80, 60, 0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 30%, rgba(210,180,140,0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(192,57,43,0.04) 0%, transparent 50%);
    pointer-events: none;
  }
  .auth-container { width: 100%; max-width: 400px; }
  .auth-header { text-align: center; margin-bottom: 32px; }
  .auth-header h1 {
    font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-mid); font-weight: 600; margin-bottom: 8px;
  }
  .auth-header h1 span { color: var(--accent); }
  .auth-header p { font-size: 14px; color: var(--text-dim); font-weight: 300; }
  .auth-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 20px; padding: 36px 32px;
    box-shadow: 0 4px 30px var(--warm-shadow), 0 1px 3px var(--warm-shadow);
  }
  .tabs {
    display: flex; margin-bottom: 28px;
    background: rgba(168,158,147,0.08); border-radius: 12px; padding: 4px;
  }
  .tab {
    flex: 1; padding: 10px 0; text-align: center; font-size: 14px; font-weight: 500;
    color: var(--text-dim); border: none; background: transparent;
    border-radius: 10px; cursor: pointer; transition: all 0.2s;
    font-family: 'Outfit', sans-serif;
  }
  .tab.active {
    background: var(--card); color: var(--text);
    box-shadow: 0 1px 4px var(--warm-shadow);
  }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--text-mid); margin-bottom: 6px;
  }
  .form-group input {
    width: 100%; padding: 12px 16px; border: 1px solid var(--card-border);
    border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 15px;
    color: var(--text); background: var(--bg); transition: border-color 0.2s; outline: none;
  }
  .form-group input:focus { border-color: var(--accent-soft); }
  .form-group input::placeholder { color: var(--text-dim); font-weight: 300; }
  .submit-btn {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: linear-gradient(145deg, var(--accent), var(--accent-soft));
    color: white; font-family: 'Outfit', sans-serif; font-size: 15px;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 3px 12px rgba(192,57,43,0.25); margin-top: 6px;
  }
  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(192,57,43,0.3); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .msg {
    border-radius: 10px; padding: 10px 14px; font-size: 13px;
    margin-bottom: 16px; display: none;
  }
  .msg.error { background: rgba(192,57,43,0.08); border: 1px solid rgba(192,57,43,0.15); color: var(--accent); }
  .msg.success { background: rgba(106,158,126,0.08); border: 1px solid rgba(106,158,126,0.15); color: var(--green); }
  .footer-text { text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-dim); }
  @media (max-width: 480px) { .auth-card { padding: 28px 24px; } }
</style>
</head>
<body>
<div class="auth-container">
  <div class="auth-header">
    <h1>Dictare <span>●</span> Medicală</h1>
    <p>Transcriere vocală pentru medici</p>
  </div>
  <div class="auth-card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Autentificare</button>
      <button class="tab" onclick="switchTab('register')">Cont nou</button>
    </div>
    <div id="errorMsg" class="msg error"></div>
    <div id="successMsg" class="msg success"></div>
    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="doctor@exemplu.ro" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Parolă</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">Intră în cont</button>
    </div>
    <div id="registerForm" style="display:none;">
      <div class="form-group">
        <label>Nume complet</label>
        <input type="text" id="regName" placeholder="Dr. Maria Popescu" autocomplete="name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="doctor@exemplu.ro" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Parolă</label>
        <input type="password" id="regPass" placeholder="minim 6 caractere" autocomplete="new-password">
      </div>
      <button class="submit-btn" id="regBtn" onclick="handleRegister()">Creează cont</button>
    </div>
    <div class="footer-text">Datele sunt stocate securizat și criptat.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://qyvazbksamffwqfxakoo.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5dmF6YmtzYW1mZndxZnhha29vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODgzNTAsImV4cCI6MjA5MDU2NDM1MH0.vB6dz16AkEXE-Vs6tRKbv0vfL8M7OE0r7QI38KRSKug';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Already logged in? Go to app
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = '/app.html';
  });

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
    });
    document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = '';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg; el.style.display = '';
    document.getElementById('errorMsg').style.display = 'none';
  }

  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    if (!email || !pass) { showError('Completează toate câmpurile.'); return; }
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Se conectează...';
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) {
      showError(error.message === 'Invalid login credentials' ? 'Email sau parolă incorectă.' : error.message);
      btn.disabled = false; btn.textContent = 'Intră în cont'; return;
    }
    window.location.href = '/app.html';
  }

  async function handleRegister() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPass').value;
    if (!name || !email || !pass) { showError('Completează toate câmpurile.'); return; }
    if (pass.length < 6) { showError('Parola trebuie să aibă minim 6 caractere.'); return; }
    const btn = document.getElementById('regBtn');
    btn.disabled = true; btn.textContent = 'Se creează contul...';
    const { data, error } = await sb.auth.signUp({
      email, password: pass,
      options: { data: { full_name: name } }
    });
    if (error) {
      showError(error.message); btn.disabled = false; btn.textContent = 'Creează cont'; return;
    }
    if (data?.session) {
      window.location.href = '/app.html';
    } else {
      showSuccess('Cont creat! Te poți autentifica.');
      switchTab('login');
      btn.disabled = false; btn.textContent = 'Creează cont';
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      if (document.getElementById('loginForm').style.display !== 'none') handleLogin();
      else handleRegister();
    }
  });
</script>
</body>
</html>
